<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Expense Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div class="container">
 
    <!-- Header -->
    <div class="header">
      <h1>💰 My Expenses</h1>
      <button id="logoutBtn">Logout</button>
    </div>
 
    <!-- Summary Cards -->
    <div class="summary-cards">
      <div class="card">
        <p class="card-label">Total This Month</p>
        <p class="card-amount" id="totalAmount">₹0</p>
      </div>
      <div class="card">
        <p class="card-label">Highest Category</p>
        <p class="card-amount" id="highestCategory">-</p>
      </div>
      <div class="card">
        <p class="card-label">Total Expenses</p>
        <p class="card-amount" id="totalCount">0</p>
      </div>
    </div>
 
    <!-- Add Expense Form -->
    <div class="add-expense-box">
      <h3>Add New Expense</h3>
      <input type="text" id="expenseTitle" placeholder="Expense title (e.g. Lunch)" />
      <input type="number" id="expenseAmount" placeholder="Amount (₹)" />
      <div class="expense-options">
        <select id="expenseCategory">
          <option value="Food">🍕 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Other">📦 Other</option>
        </select>
        <input type="date" id="expenseDate" />
      </div>
      <input type="text" id="expenseNote" placeholder="Note (optional)" />
      <button id="addExpenseBtn">+ Add Expense</button>
    </div>
 
    <!-- Filter -->
    <div class="filter-box">
      <select id="filterMonth">
        <option value="">All Months</option>
        <option value="01">January</option>
        <option value="02">February</option>
        <option value="03">March</option>
        <option value="04">April</option>
        <option value="05">May</option>
        <option value="06">June</option>
        <option value="07">July</option>
        <option value="08">August</option>
        <option value="09">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
      <select id="filterCategory">
        <option value="">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Health">Health</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>
    </div>
 
    <!-- Expense List -->
    <div id="expenseList"></div>
 
  </div>
 
  <script type="module" src="script.js"></script>
</body>
</html>
